name: 🔔 LinkedIn Intelligence Monitor

on:
  schedule:
    - cron: '30 3 * * *'   # Daily at 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:        # Run manually from GitHub UI anytime

jobs:
  monitor:
    name: Leads + Competitor Intel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # Restore seen_posts.json so we never re-email the same post
      - name: 💾 Restore seen-posts cache
        uses: actions/cache/restore@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.ref_name }}
          restore-keys: |
            seen-posts-${{ github.ref_name }}

      - name: 🚀 Run monitor
        env:
          SERPAPI_KEY_1:    ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2:    ${{ secrets.SERPAPI_KEY_2 }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python monitor.py

      # Always save — overwrites previous entry so deduplication works
      - name: 💾 Save updated seen-posts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.ref_name }}

      - name: 📋 Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: monitor.log
          if-no-files-found: ignore
          retention-days: 7
