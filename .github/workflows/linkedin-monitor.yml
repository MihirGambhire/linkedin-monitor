name: 📡 LinkedIn Strategic Intelligence

on:
  schedule:
    - cron: '30 3 * * *'   # Daily 9:00 AM IST (3:30 AM UTC)
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 💾 Restore seen-posts cache
        uses: actions/cache/restore@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.ref_name }}
          restore-keys: seen-posts-${{ github.ref_name }}

      - name: 🚀 Run monitor
        env:
          SERPAPI_KEY_1:    ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2:    ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3:    ${{ secrets.SERPAPI_KEY_3 }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python monitor.py

      - name: 💾 Save seen-posts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.ref_name }}

      - name: 📋 Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ github.run_id }}
          path: monitor.log
          if-no-files-found: ignore
          retention-days: 7
